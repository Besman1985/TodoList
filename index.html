<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="calendar-app">
        <header class="header">
            <div class="header-top">
                <button class="icon-button back-button">&lt;</button>
                <button class="icon-button settings-button">
                    <img src="path/to/settings-icon.svg" alt="Настройки">
                </button>
            </div>
            <div class="date-display">
                <h1 class="date-text">Понедельник, 15 Сентября 2021</h1>
            </div>
            <div class="week-days">
                <div class="day-card active">
                    <span class="day-name">MON</span>
                    <span class="day-number">15</span>
                </div>
                <div class="day-card">
                    <span class="day-name">TUE</span>
                    <span class="day-number">16</span>
                </div>
                <div class="day-card">
                    <span class="day-name">WED</span>
                    <span class="day-number">17</span>
                </div>
                <div class="day-card">
                    <span class="day-name">THU</span>
                    <span class="day-number">18</span>
                </div>
                <div class="day-card">
                    <span class="day-name">FRI</span>
                    <span class="day-number">19</span>
                </div>
            </div>
            <div class="arrow-down-container">
                <!-- <img src="path/to/arrow-down.svg" alt="Показать больше"> -->
            </div>
        </header>

        <main class="events-container">
            <div class="time-line">
                <span class="time-label">7 am</span>
                <!-- <div class="event-card training">
                    <span class="event-title">Утренняя тренировка</span>
                    <span class="event-details">с Анной</span>
                    <span class="event-time">7:00 am - 8:30 am</span>
                </div> -->
            </div>
            <div class="time-line">
                <span class="time-label">8 am</span>
            </div>

            <div class="time-line">
                <span class="time-label">9 am</span>
            </div>
            <div class="time-line">
                <span class="time-label">10 am</span>
                <!-- <div class="event-card team-meeting">
                    <span class="event-title">Командная встреча</span>
                    <span class="event-details">(Фронтенд и Бэкенд)</span>
                    <span class="event-time">9:20 am - 11:15 am</span>
                    <div class="event-participants">
                        <img src="path/to/user1.png" alt="Участник 1">
                        <img src="path/to/user2.png" alt="Участник 2">
                        <img src="path/to/user3.png" alt="Участник 3">
                        <div class="more-users">+2</div>
                    </div>
                </div> -->
            </div>
            <div class="time-line">
                <span class="time-label">11 am</span>
            </div>
            <div class="time-line current-time">
                <span class="time-label">11:30</span>
                <div class="current-time-indicator"></div>
            </div>
            <div class="time-line">
                <span class="time-label">12 am</span>
                <!-- <div class="event-card call-nikita">
                    <span class="event-title">Позвонить Никите</span>
                    <span class="event-details">по поводу покупки машины</span>
                    <span class="event-time">12:10 am - 12:30 am</span>
                </div> -->
            </div>
            <div class="time-line">
                <span class="time-label">1 pm</span>
            </div>
            <div class="time-line">
                <span class="time-label">2 pm</span>
            </div>
            <div class="time-line">
                <span class="time-label">3 pm</span>
            </div>
            <div class="time-line">
                <span class="time-label">4 pm</span>
            </div>
        </main>

        <footer class="navbar">
            <button class="navbar-item active">
                <img src="path/to/home-icon.svg" alt="Домашняя">
            </button>
            <button class="navbar-item">
                <img src="path/to/chart-icon.svg" alt="Отчеты">
            </button>
            <button class="navbar-item add-button">
                <img src="path/to/add-icon.svg" alt="Добавить">
            </button>
            <button class="navbar-item">
                <img src="path/to/bell-icon.svg" alt="Уведомления">
            </button>
            <button class="navbar-item">
                <img src="path/to/user-icon.svg" alt="Профиль">
            </button>
        </footer>
    </div>
</body>
</html>
