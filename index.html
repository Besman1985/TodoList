<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calendar-app">
        <header class="header">
            <div class="header-top">
                <button class="navbar-item">
                     <img src="icons/free-icon-layout-11394404.png" alt="Настройки"></button>
                <button class="navbar-item">
                    <img src="icons/free-icon-layout-11394404.png" alt="Настройки">
                </button>
            </div>
            <div class="date-display">
                <h1 class="date-text"></h1>
            </div>

            <div class="week-days"></div>


        </header>
        <div class="arrow-down-container">
            <button id="prev-week-btn" class="btnPrev"> prev </button>
            <button id="next-week-btn" class="btnNext"> next </button>
        </div>

        <main class="events-container">
           
            <!-- <div class="time-line">
                <div class="time-line current-time">
                    <span class="time-label">11:30</span>
                    <div class="current-time-indicator"></div>
                </div>
            </div> -->
            
        </main>

        <footer class="navbar">
            <button class="navbar-item active">
                <img src="icons/free-icon-task-list-8584777.png" alt="Список дел">
            </button>
            <button class="navbar-item">
                <img src="icons/free-icon-weather-2938068.png" alt="Погода">
            </button>
            <button id="add-button" class="navbar-item add-button">
                <img src="icons/free-icon-file-968230.png" alt="Добавить">
            </button>
            <button class="navbar-item">
                <img src="icons/free-icon-checklist-4379544.png" alt="Покупки">
            </button>
            <button class="navbar-item">
                <img src="icons/free-icon-news-4021923.png" alt="Новости">
            </button>
        </footer>


    </div>
    <script src="script.js"></script>
</body>

</html>
