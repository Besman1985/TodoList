<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calendar-app">
        <header class="header">
            <div class="header-top">
                <button class="icon-button back-button">&lt;</button>
                <button class="icon-button settings-button">
                    <img src="path/to/settings-icon.svg" alt="Настройки">
                </button>
            </div>
            <div class="date-display">
                <h1 class="date-text">Понедельник, 15 Сентября 2021</h1>
            </div>

            <div class="week-days">


            </div>

            <button id="prev-week-btn" class="btnPrev"> &lt; </button>
            <button id="next-week-btn" class="btnNext"> &gt; </button>

            <div class="arrow-down-container">
            </div>
        </header>

        <main class="events-container">
            <div class="time-line">
                <span class="time-label">7 am</span>
                <div class="event"></div>
            </div>
            <div class="time-line">
                <span class="time-label">8 am</span>
            </div>
            <div class="time-line">
                <span class="time-label">9 am</span>
            </div>
            <div class="time-line">
                <span class="time-label">10 am</span>
           
            </div>
            <div class="time-line">
                <span class="time-label">11 am</span>
            </div>



            <!-- <div class="time-line current-time">
                <span class="time-label">11:30</span>
                <div class="current-time-indicator"></div>
            </div> -->



            <div class="time-line">      
            </div>
            <div class="time-line">
                <span class="time-label">1 pm</span>
            </div>
            <div class="time-line">
                <span class="time-label">2 pm</span>
            </div>
            <div class="time-line">
                <span class="time-label">3 pm</span>
            </div>
            <div class="time-line">
                <span class="time-label">4 pm</span>
            </div>
        </main>

        <footer class="navbar">
            <button class="navbar-item active">
                <img src="icons/free-icon-task-list-8584777.png" alt="Домашняя">
            </button>
            <button class="navbar-item">
                <img src="icons/free-icon-weather-2938068.png" alt="Погода">
            </button>
            <button id="add-button" class="navbar-item add-button">
                <img src="icons/free-icon-file-968230.png" alt="Добавить">
            </button>
            <button class="navbar-item">
                <img src="icons/free-icon-checklist-4379581.png" alt="Покупки">
            </button>
            <button class="navbar-item ">
                <img src="icons/free-icon-news-4588065.png" alt="Лента новостей">
            </button>




        </footer>
        <div class="modal">
            <div class="modal__dialog">
                <div class="modal__content">
                    <form action="#">
                        <div class="modal__close">&times;</div>
                        <div class="modal__title">Добавить задачу</div>
                        <input required placeholder="Дата" name="date" type="date" class="modal__input">
                        <input required placeholder="Дата" name="time" type="time" class="modal__input">
                        <input required placeholder="Название" name="item" type="text" class="modal__input">
                        <textarea class="modal__input" required placeholder="Что нужно сделать..." name="content" type="text" class="modal__cont"></textarea>

                        <button class="btn btn_dark btn_min">Создать</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
